  ════════════════════════════════════════════════════════════════════════
  AI AGENTS / TOOLING — READ THIS BEFORE EDITING THIS DECK
  ════════════════════════════════════════════════════════════════════════
  Full authoring guide (schema + copy-paste snippets): https://bento.page/agents.md

  THE MECHANICS
  · The document is the ONE script block of type "application/bento+json",
    id "bento-doc", below — plain readable JSON. Edit THAT block in place;
    never regenerate the whole file. Escape every "<" in the JSON as \u003c.
  · The base64 blocks near the end are the DEFLATE-compressed app runtime
    (open source, https://bento.page) — no user content, leave them alone.
  · In a running file, window.bento exposes { doc, serialize(), loadDoc(json),
    comments(), updates, i18n }. In the app UI: About → Copy / Replace JSON.

  MAKE A GREAT DECK, NOT JUST A CORRECT ONE
  Bento's whole point is motion + interactivity. A wall of text slides wastes
  it. When the source material contains ↓, reach for the feature:
  · numbers to compare visually (trend, magnitude, share)  →  a CHART
      element (preset bar|line|pie|scatter). Never list data as bullet text.
  · a comparison / spec / pricing / feature grid  →  a TABLE element
      (columns[] + rows[] of cells + a style object). Not a pile of textboxes.
  · consecutive slides about the SAME thing changing (before/after, process
    steps, a metric across stages)  →  give the shared elements the SAME id
    on both slides and set the later slide's transition to "morph". This is
    Bento's signature move — use it liberally; it is almost always missed.
  · a point to drill into (a definition, "click to see how")  →  a STATE
    slide (stateOf: "<parent-id>" + an element link: "<state-id>").
  · a hero / full-slide image  →  full-bleed image (0,0,1280,720) + a scrim
    rect + text on top, with a slow ken-burns drift
      (fx:{ambient:"kenburns",ken:{dir:"drift",scale:1.08,duration:20}}).
  · a sequence / flow / timeline / connection  →  a line or path with a
    loop (fx:{loop:{type:"dash-march",...}}), or morph a highlight through it.
  · a headline number  →  big, with fx:{countUp:true}.
  · every cover / section divider  →  at least ONE ambient motion so it is
    not dead static.
  · repeated chrome or a logo  →  keep its id stable across slides so it
    morphs in place instead of popping.

  BEFORE YOU FINISH — self-audit:
  [ ] any numbers rendered as text that should be a chart?
  [ ] do consecutive slides on one subject share ids + transition:"morph"?
  [ ] at least one motion moment (ken-burns / loop / count-up), esp. the cover?
  [ ] a drill-down that would work better as a state slide?
  [ ] one accent colour, at most two typefaces, 96px side margins?
  [ ] speaker notes written (they travel in the file)?
  ════════════════════════════════════════════════════════════════════════

ntities with fingerprints. The relay itself stores only ciphertext and learns nothing. Offline edits merge back through our own CRDT (character-level text merging), verified by a convergence rig across hundreds of thousands of checks.","elements":[{"id":"t-e","type":"text","x":96,"y":96,"w":900,"h":24,"rotation":0,"opacity":1,"html":"TOGETHER, LIVE","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"#FF9E8A","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":5},{"id":"t-f","type":"text","x":90,"y":140,"w":1100,"h":180,"rotation":0,"opacity":1,"html":"The file is\u003cbr>the invitation.","fontSize":76,"fontFamily":"Fraunces, Georgia, serif","fontWeight":900,"color":"#fff","align":"left","valign":"top","lineHeight":1.02},{"id":"t-g","type":"text","x":96,"y":350,"w":1080,"h":120,"rotation":0,"opacity":1,"html":"Start a live session and send the file — anyone who opens a copy joins. \u003cb>E2EE\u003c/b>, keys never leave the file, offline edits merge both ways. Access is \u003cb>per-person\u003c/b>: each device holds its own key, read-only copies can’t write, and the owner can remove anyone — enforced at the blind relay, not by courtesy.","fontSize":20,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(182,193,210,0.9)","align":"left","valign":"top","lineHeight":1.55,"fx":{"enter":"fade-up"}},{"id":"s-h","type":"shape","shape":"rect","x":96,"y":500,"w":254,"h":118,"rotation":0,"opacity":1,"fill":"#16273E","stroke":"none","strokeWidth":0,"radius":16,"fx":{"enter":"fade-up","order":1}},{"id":"t-i","type":"text","x":120,"y":522,"w":206,"h":28,"rotation":0,"opacity":1,"html":"E2EE","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":800,"color":"#FF9E8A","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":2,"fx":{"enter":"fade-up","order":1}},{"id":"t-j","type":"text","x":120,"y":552,"w":206,"h":56,"rotation":0,"opacity 0,"w":254,"h":118,"rotation":0,"opacity":1,"fill":"#16273E","stroke":"none","strokeWidth":0,"radius":16,"fx":{"enter":"fade-up","order":4}},{"id":"t-r","type":"text","x":954,"y":522,"w":206,"h":28,"rotation":0,"opacity":1,"html":"OWN CRDT","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":800,"color":"#FF9E8A","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":2,"fx":{"enter":"fade-up","order":4}},{"id":"t-s","type":"text","x":954,"y":552,"w":206,"h":56,"rotation":0,"opacity":1,"html":"char-level merges, fuzz-tested","fontSize":14,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(182,193,210,0.9)","align":"left","valign":"top","lineHeight":1.4,"fx":{"enter":"fade-up","order":4}}]},{"id":"an-ai","background":"#F2F0EA","transition":"fade","notes":"Full disclosure: an AI agent designed and wrote this deck — and the four templates in the gallery — by editing the JSON directly. The recipe your agent needs is one markdown file: bento.page/agents.md. If you never touch AI, nothing here ever will either.","elements":[{"id":"t-t","type":"text","x":96,"y":96,"w":900,"h":24,"rotation":0,"opacity":1,"html":"BUILT FOR AI · WORKS WITHOUT IT","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"#C25A43","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":5},{"id":"t-u","type":"text","x":90,"y":140,"w":1100,"h":200,"rotation":0,"opacity":1,"html":"An agent wrote\u003cbr>this deck.","fontSize":76,"fontFamily":"Fraunces, Georgia, serif","fontWeight":900,"color":"#0D1B2E","align":"left","valign":"top","lineHeight":1.02},{"id":"t-v","type":"text","x":96,"y":370,"w":1000,"h":130,"rotation":0,"opacity":1,"html":"The document is plain JSON in the file, so agents edit \u003cb>.bento.html\u003c/b> files in place and chatbots round-trip the JSON. No converters, no uploads, no .pptx to wrestle — this deck and the whole template gallery were authored that way. There’s a Claude Code skill (\u003cb>bento-slides\u003c/b>) that even fetches the app itself.","fontSize":20,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(20,34,54,0.75)","align":"left","valign":"top","lineHeight":1.55,"fx":{"enter":"fade-up"}},{"id":"s-w","type":"shape","shape":"rect","x":96,"y":540,"w":620,"h":70,"rotation":0,"opacity":1,"fill":"#0D1B2E","stroke":"none","strokeWidth":0,"radius":35,"fx":{"enter":"fade-up","order":2}},{"id":"t-x","type":"text","x":96,"y":562,"w":620,"h":30,"rotation":0,"opacity":1,"html":"bento.page/agents.md — the recipe for your agent","fontSize":17,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":600,"color":"#F0EBE0","align":"center","valign":"top","lineHeight":1.3,"fx":{"enter":"fade-up","order":2}}]},{"id":"an-forever","background":"#0D1B2E","transition":"fade","notes":"Local-first, provably: Offline mode hard-blocks every network feature. Updates are ECDSA-signed, verified in-app, and write a NEW file — the old one stays as rollback. If bento.page vanished tomorrow, every file keeps working. That is the whole point.","elements":[{"id":"t-y","type":"text","x":96,"y":96,"w":900,"h":24,"rotation":0,"opacity":1,"html":"LOCAL-FIRST, PROVABLY","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"#FF9E8A","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":5},{"id":"t-z","type":"text","x":90,"y":140,"w":1100,"h":200,"rotation":0,"opacity":1,"html":"This file will open\u003cbr>in 2036.","fontSize":76,"fontFamily":"Fraunces, Georgia, serif","fontWeight":900,"color":"#fff","align":"left","valign":"top","lineHeight":1.02},{"id":"t-10","type":"text","x":96,"y":370,"w":1000,"h":140,"rotation":0,"opacity":1,"html":"No account. No telemetry. An \u003cb>Offline mode\u003c/b> that hard-blocks everything network-shaped. Signed updates you apply yourself — each one writes a new file, so the old one is your rollback. Documents should outlive the companies that made them.","fontSize":20,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(182,193,210,0.9)","align":"left","valign":"top","lineHeight":1.62,"fx":{"enter":"fade-up"}},{"id":"t-11","type":"text","x":96,"y":620,"w":1000,"h":30,"rotation":0,"opacity":1,"html":"IF BENTO.PAGE VANISHED TONIGHT, EVERY FILE KEEPS OPENING, EDITING, PRESENTING.","fontSize":12,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"rgba(182,193,210,0.55)","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":3,"fx":{"enter":"fade-up","order":2}}]},{"id":"an-honest","background":"#16273E","transition":"fade","notes":"The honest slide. Undo during live collab is snapshot-based (LWW) and can revert a collaborator’s concurrent same-property edit — the CRDT still keeps everyone converged. Editing is desktop-first; phones view and present beautifully. Morph only animates elements that share an id across slides — a deliberate idiom, not automatic magic-move. Identities are key-bound, not human-verified — the People panel proves \"same key,\" and SSO name-mapping is the one roadmap piece (the RBAC and revocation are already cryptographic). We would rather you hear it from us.","elements":[{"id":"t-12","type":"text","x":96,"y":96,"w":900,"h":24,"rotation":0,"opacity":1,"html":"WHAT IT DOESN’T DO (YET)","fontSize":13,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"#FF9E8A","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":5},{"id":"t-13","type":"text","x":90,"y":140,"w":1000,"h":110,"rotation":0,"opacity":1,"html":"The honest slide.","fontSize":64,"fontFamily":"Fraunces, Georgia, serif","fontWeight":900,"color":"#fff","align":"left","valign":"top","lineHeight":1},{"id":"t-14","type":"text","x":96,"y":280,"w":1060,"h":320,"rotation":0,"opacity":1,"html":"· Undo under live collab is snapshot-based (LWW) — it can revert a peer’s concurrent edit\u003cbr>· Editing is desktop-first; phones view and present beautifully\u003cbr>· Morph only animates elements that \u003cb>share an id\u003c/b> across slides — not automatic “magic move”\u003cbr>· Identities are key-bound, not human-verified — SSO name-mapping is on the roadmap\u003cbr>· Files grow with embedded images and video — no optimizer yet\u003cbr>· Docs and Sheets don’t exist yet. Slides came first.","fontSize":20,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(182,193,210,0.9)","align":"left","valign":"top","lineHeight":1.85,"fx":{"enter":"fade-up"}},{"id":"t-15","type":"text","x":96,"y":620,"w":1000,"h":30,"rotation":0,"opacity":1,"html":"TRADE-OFFS ARE DESIGN. WE’D RATHER DISCLOSE THAN DISAPPOINT.","fontSize":12,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"rgba(255,158,138,0.7)","align":"left","valign":"top","lineHeight":1.3,"letterSpacing":3,"fx":{"enter":"fade-up","order":2}}]},{"id":"an-close","background":"#0D1B2E","transition":"morph","notes":"The close. This file is now the reader’s: because it is a template, saving mints a fresh identity automatically — their copy is theirs, keys and all. That is the viral loop: every shared deck is a working install.","elements":[{"id":"bn-a","type":"shape","shape":"rect","x":540,"y":90,"w":200,"h":200,"rotation":0,"opacity":1,"fill":"#FF9E8A","stroke":"none","strokeWidth":0,"radius":36,"shadow":{"blur":46,"color":"rgba(255,238,214,0.28)"}},{"id":"bn-b","type":"shape","shape":"rect","x":464,"y":210,"w":120,"h":180,"rotation":0,"opacity":1,"fill":"#5E7699","stroke":"none","strokeWidth":0,"radius":21.599999999999998},{"id":"bn-c","type":"shape","shape":"rect","x":700,"y":230,"w":120,"h":120,"rotation":0,"opacity":1,"fill":"#F0EBE0","stroke":"none","strokeWidth":0,"radius":21.599999999999998},{"id":"t-16","type":"text","x":140,"y":360,"w":1000,"h":130,"rotation":0,"opacity":1,"html":"One file. Yours. Forever.","fontSize":74,"fontFamily":"Fraunces, Georgia, serif","fontWeight":900,"color":"#fff","align":"center","valign":"top","lineHeight":1},{"id":"t-17","type":"text","x":140,"y":494,"w":1000,"h":60,"rotation":0,"opacity":1,"html":"\u003cb>bento.page\u003c/b> — site + gallery &nbsp;·&nbsp; \u003cb>bento.page/slides\u003c/b> — the app &nbsp;·&nbsp; \u003cb>MIT\u003c/b> — github.com/nyblnet/bento","fontSize":18,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":400,"color":"rgba(182,193,210,0.9)","align":"center","valign":"top","lineHeight":1.6,"fx":{"enter":"fade-up"}},{"id":"t-18","type":"text","x":140,"y":600,"w":1000,"h":30,"rotation":0,"opacity":1,"html":"PRESS ESC AND SAVE A COPY — THIS ANNOUNCEMENT IS NOW YOUR DECK. FRESH IDENTITY INCLUDED.","fontSize":12,"fontFamily":"'Instrument Sans', 'Helvetica Neue', sans-serif","fontWeight":700,"color":"rgba(255,158,138,0.85)","align":"center","valign":"top","lineHeight":1.3,"letterSpacing":2.5,"fx":{"enter":"fade-up","order":2}}]}],"modified":"2026-07-24T00:10:37.912Z"}

    <style>
#bento-splash{position:fixed;inset:0;z-index:9999;display:grid;place-content:center;justify-items:center;gap:26px;background:radial-gradient(130% 90% at 50% 38%,#1c2c44 0%,#101c2c 58%,#0a1220 100%);pointer-events:none;transition:opacity .5s ease;animation:bsAuto .6s ease 9s both}
#bento-splash.done{opacity:0}
.bs-mark{position:relative;width:104px;height:104px;border-radius:24px;background:#16273e;box-shadow:0 0 56px rgba(255,238,214,.26),0 10px 34px rgba(0,0,0,.55);overflow:hidden;animation:bsIn .7s cubic-bezier(.22,1.4,.36,1) both,bsFloat 3.4s ease-in-out .9s infinite}
.bs-mark i{position:absolute;border-radius:9px;opacity:0;animation:bsTile .55s cubic-bezier(.25,1.5,.45,1) both}
.bs-b{left:12px;top:12px;width:24px;height:80px;background:#5e7699;animation-delay:.18s}
.bs-a{right:12px;top:12px;width:50px;height:37px;background:#ff9e8a;animation-delay:.3s}
.bs-c{right:12px;bottom:12px;width:50px;height:37px;background:#f0ebe0;animation-delay:.42s}
.bs-mark:after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.35) 50%,transparent 62%);transform:translateX(-130%);animation:bsSheen 1s ease 1.05s both}
.bs-word{font:600 15px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e8edf4;letter-spacing:.42em;text-transform:uppercase;text-indent:.42em;animation:bsUp .6s ease .55s both}
.bs-word b{color:#ff9e8a;font-weight:800}
.bs-bar{width:124px;height:2px;border-radius:1px;background:rgba(255,255,255,.13);overflow:hidden;animation:bsUp .5s ease .85s both}
.bs-bar i{display:block;width:44%;height:100%;border-radius:1px;background:linear-gradient(90deg,#ff9e8a,#ffbca8);animation:bsScan 1.1s cubic-bezier(.45,0,.55,1) 1s infinite alternate}
@keyframes bsIn{from{transform:scale(.55) rotate(-8deg);opacity:0}}
@keyframes bsTile{from{transform:translateY(28px) scale(.6);opacity:0}to{transform:none;opacity:1}}
@keyframes bsSheen{to{transform:translateX(130%)}}
@keyframes bsFloat{50%{transform:translateY(-5px)}}
@keyframes bsUp{from{opacity:0;transform:translateY(10px)}}
@keyframes bsScan{from{transform:translateX(-30%)}to{transform:translateX(210%)}}
@keyframes bsAuto{to{opacity:0;visibility:hidden}}
@media (prefers-reduced-motion:reduce){#bento-splash,#bento-splash *,.bs-mark:after{animation-duration:.01ms;animation-delay:0ms;animation-iteration-count:1}}
    </style>

    <script>
(async () => {
  var fail = function (msg) {
    var d = document.createElement('div')
    d.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0D1B2E;color:#F2F0EA;font:16px/1.6 sans-serif;text-align:center;padding:40px;z-index:99999'

  if (typeof DecompressionStream === 'undefined') {
    fail('This file needs a browser from 2023 or later (Chrome 80+, Edge, Firefox 113+, Safari 16.4+).<br>The document itself is intact \u2014 open this file in a newer browser.')
    return
  }
  var inflate = async function (id) {
    var b64 = document.getElementById(id).textContent.trim()
    var bytes = Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0) })
    var ds = new DecompressionStream('deflate-raw')
    var stream = new Blob([bytes]).stream().pipeThrough(ds)
    return await new Response(stream).text()

    var st = document.createElement('style')
    st.textContent = css
